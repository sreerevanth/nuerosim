# ─────────────────────────────────────────────────────────────
#  NeuroSim CI/CD Pipeline
#  GitHub Actions — runs on every PR and push to main
# ─────────────────────────────────────────────────────────────

name: NeuroSim CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * 1"   # Weekly regression run

env:
  PYTHON_VERSION: "3.11"
  COVERAGE_THRESHOLD: "80"

jobs:

  # ── Linting & formatting ─────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install ruff black mypy

      - name: Run ruff
        run: ruff check python/ --output-format=github

      - name: Check Black formatting
        run: black --check python/

      - name: Run mypy
        run: mypy python/neurosim --ignore-missing-imports
        continue-on-error: true   # warn but don't block


  # ── Unit tests (CPU-only, no MPI) ───────────────────────────
  test-unit:
    name: Unit Tests (Python)
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]" --no-build-isolation

      - name: Run unit tests with coverage
        run: |
          pytest tests/test_neuron_models.py \
            -v --tb=short \
            --cov=python/neurosim \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage.xml
          flags: unittests
          name: python-${{ matrix.python-version }}


  # ── Integration tests ────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]" --no-build-isolation

      - name: Run integration tests
        run: |
          pytest tests/test_integration.py \
            -v --tb=short --timeout=120

      - name: Run AP waveform regression
        run: |
          python scripts/validate_ap_waveform.py \
            --config configs/experiments.yaml \
            --tolerance 0.05


  # ── Benchmarks (performance regression) ─────────────────────
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test-unit
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]" --no-build-isolation

      - name: Run benchmarks
        run: |
          pytest tests/benchmarks/ \
            --benchmark-only \
            --benchmark-json=benchmark_results.json \
            --benchmark-min-rounds=3

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: pytest
          output-file-path: benchmark_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "120%"
          comment-on-alert: true
          fail-on-alert: true


  # ── C++ build ────────────────────────────────────────────────
  build-cpp:
    name: C++ Build (CPU only)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake and dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake libhdf5-dev libeigen3-dev \
            libopenmpi-dev openmpi-bin libgtest-dev

      - name: Configure CMake (no CUDA in CI)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_CUDA=OFF \
            -DENABLE_MPI=ON \
            -DENABLE_OPENMP=ON \
            -DBUILD_TESTS=ON \
            -DBUILD_PYTHON=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run C++ unit tests
        run: |
          cd build && ctest --output-on-failure -j$(nproc)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: cpp-build
          path: build/
          retention-days: 7


  # ── Docker build & push ──────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-integration, build-cpp]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/neurosim
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/neurosim-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ── Security scan ────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --require-hashes -r <(pip freeze)
        continue-on-error: true


  # ── Documentation build ──────────────────────────────────────
  docs:
    name: Build Docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install doc dependencies
        run: pip install -e ".[docs]" --no-build-isolation

      - name: Build Sphinx docs
        run: |
          cd docs && make html SPHINXOPTS="-W --keep-going"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html


  # ── Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [docker, docs]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
